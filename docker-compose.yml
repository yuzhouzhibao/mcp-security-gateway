services:
  app:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
    command: uv run uvicorn mcp_security_gateway.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ${ENV_FILE:-.env.example}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mcp_security_gateway
      POSTGRES_USER: mcp_gateway
      POSTGRES_PASSWORD: mcp_gateway_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
